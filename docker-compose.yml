services:
  ollama:
    image: ollama/ollama:latest
    container_name: chic-boutique-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chic-boutique-chatbot
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2:3b
    volumes:
      - ./eval:/app/eval
    command: []

volumes:
  ollama_data:
